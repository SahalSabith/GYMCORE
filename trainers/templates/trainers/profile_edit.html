{% extends 'base.html' %}
{% block title %}Edit Trainer Profile — IronForge{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'trainers:my_profile' %}" class="text-gray-400 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    </a>
    <h1 class="text-3xl font-display tracking-widest text-white">EDIT PROFILE</h1>
  </div>

  <div class="bg-surface-card border border-surface-border rounded-xl p-6">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-300 mb-1.5">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<p class="text-red-400 text-xs mt-1">{{ error }}</p>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full btn-primary py-3 rounded-lg font-semibold">Save Profile</button>
    </form>
  </div>
</div>
{% endblock %}
