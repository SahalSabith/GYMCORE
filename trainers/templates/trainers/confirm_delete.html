{% extends 'base.html' %}
{% block title %}Remove Assignment — IronForge{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-surface-card border border-surface-border rounded-xl p-8 text-center">
  <div class="w-12 h-12 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-2.194-.833-2.964 0L3.34 16.5C2.57 18.333 3.5 20 5.07 20z"/></svg>
  </div>
  <h2 class="text-xl font-bold text-white mb-2">Remove Assignment?</h2>
  <p class="text-gray-400 text-sm mb-6">This will remove the trainer–member pairing. It can be reassigned later.</p>
  <form method="post" class="flex gap-3 justify-center">
    {% csrf_token %}
    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition-colors">Remove</button>
    <a href="{% url 'trainers:assignments' %}" class="border border-surface-border text-gray-300 hover:text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition-colors">Cancel</a>
  </form>
</div>
{% endblock %}
