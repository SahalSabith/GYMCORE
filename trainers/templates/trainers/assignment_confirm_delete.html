{% extends 'base.html' %}
{% block title %}Remove Assignment{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-iron-800 border border-red-700/40 rounded-2xl p-8 text-center">
    <h2 class="font-semibold text-white text-xl mb-2">Remove this assignment?</h2>
    <p class="text-iron-400 text-sm mb-2">{{ object.trainer.get_full_name }} → {{ object.member.get_full_name }}</p>
    <p class="text-iron-500 text-xs mb-6">The trainer will no longer be linked to this member.</p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl transition-colors">Remove</button>
      <a href="{% url 'trainers:admin_list' %}" class="flex-1 text-center border border-iron-600 text-iron-300 font-semibold py-3 rounded-xl transition-colors">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
