{% extends 'base.html' %}
{% block title %}Delete Plan{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-iron-800 border border-red-700/40 rounded-2xl p-8 text-center">
    <div class="w-12 h-12 bg-red-500/10 rounded-xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </div>
    <h2 class="font-semibold text-white text-xl mb-2">Delete "{{ object.name }}"?</h2>
    <p class="text-iron-400 text-sm mb-6">This action cannot be undone. Existing subscriptions will be preserved.</p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-xl transition-colors">Yes, Delete</button>
      <a href="{% url 'memberships:admin_plans' %}" class="flex-1 text-center border border-iron-600 text-iron-300 hover:text-white font-semibold py-3 rounded-xl transition-colors">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
