{% if messages %}
<div class="mb-6 space-y-2">
    {% for message in messages %}
    <div class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium
        {% if message.tags == 'error' %}bg-red-900/40 text-red-300 border border-red-800
        {% elif message.tags == 'success' %}bg-green-900/40 text-green-300 border border-green-800
        {% elif message.tags == 'warning' %}bg-yellow-900/40 text-yellow-300 border border-yellow-800
        {% else %}bg-blue-900/40 text-blue-300 border border-blue-800{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
